<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>FinLog Pro</title>
    <!-- Tailwind CSS для швидкого та красивого дизайну -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Маніфест для PWA (щоб додавався на робочий стіл) -->
    <link rel="manifest" href="data:application/manifest+json,{%22name%22:%22FinLog%20Pro%22,%22short_name%22:%22FinLog%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22#121212%22,%22theme_color%22:%22#1e1e1e%22}">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            -webkit-tap-highlight-color: transparent;
        }
    </style>
</head>
<body class="font-sans antialiased max-w-md mx-auto p-4 pb-24">

    <!-- HEADER -->
    <header class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-black text-emerald-500 tracking-wider">FINLOG <span class="text-xs bg-emerald-500 text-black px-1.5 py-0.5 rounded font-bold">PRO</span></h1>
        <div class="flex space-x-3">
            <button onclick="exportBackup()" class="text-gray-400 hover:text-white" title="Резервна копія"><i class="fa-solid fa-download text-lg"></i></button>
            <button onclick="importBackup()" class="text-gray-400 hover:text-white" title="Відновити"><i class="fa-solid fa-upload text-lg"></i></button>
            <button onclick="clearAllData()" class="text-red-500 hover:text-red-400" title="Очистити все"><i class="fa-solid fa-trash-can text-lg"></i></button>
        </div>
    </header>

    <!-- БАЛАНСИ -->
    <section class="grid grid-cols-3 gap-3 mb-6">
        <!-- КАРТКА -->
        <div class="bg-zinc-900 p-3 rounded-2xl border border-zinc-800 text-center">
            <span class="text-xs text-zinc-400 block mb-1"><i class="fa-solid fa-credit-card mr-1 text-sky-400"></i> Картка</span>
            <span id="bal-card" class="text-base font-bold text-white">0.00</span> <span class="text-xs text-zinc-400">₴</span>
        </div>
        <!-- ГОТІВКА -->
        <div class="bg-zinc-900 p-3 rounded-2xl border border-zinc-800 text-center">
            <span class="text-xs text-zinc-400 block mb-1"><i class="fa-solid fa-wallet mr-1 text-amber-400"></i> Готівка</span>
            <span id="bal-cash" class="text-base font-bold text-white">0.00</span> <span class="text-xs text-zinc-400">₴</span>
        </div>
        <!-- СКАРБНИЧКА -->
        <div class="bg-zinc-900 p-3 rounded-2xl border border-zinc-800 text-center">
            <span class="text-xs text-zinc-400 block mb-1"><i class="fa-solid fa-piggy-bank mr-1 text-pink-400"></i> Скарбничка</span>
            <span id="bal-piggy" class="text-base font-bold text-pink-400">0.00</span> <span class="text-xs text-zinc-400">₴</span>
        </div>
    </section>

    <!-- ШВИДКІ ПРЕСЕТИ -->
    <section class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 mb-6">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-sm font-semibold text-zinc-400"><i class="fa-solid fa-bolt mr-1 text-yellow-500"></i> Швидке списання</h3>
            <button id="btn-edit-presets" onclick="togglePresetEditMode()" class="text-zinc-500 hover:text-white transition">
                <i class="fa-solid fa-pen-to-square text-sm"></i>
            </button>
        </div>
        <div id="presets-list" class="flex flex-wrap gap-2">
            <!-- Пресети генеруються динамічно -->
        </div>
    </section>

    <!-- ФОРМА ВВЕДЕННЯ ТРАНЗАКЦІЇ -->
    <section class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 mb-6">
        <h3 class="text-sm font-semibold text-zinc-400 mb-3"><i class="fa-solid fa-plus-minus mr-1 text-emerald-500"></i> Нова транзакція</h3>
        
        <div class="space-y-4">
            <!-- Тип транзакції -->
            <div class="grid grid-cols-3 gap-2">
                <button onclick="setTxType('income')" id="btn-type-income" class="py-2 px-3 rounded-xl bg-zinc-800 text-zinc-300 font-bold text-xs active:scale-95 transition">Прихід</button>
                <button onclick="setTxType('expense')" id="btn-type-expense" class="py-2 px-3 rounded-xl bg-zinc-800 text-zinc-300 font-bold text-xs active:scale-95 transition">Витрата</button>
                <button onclick="setTxType('transfer')" id="btn-type-transfer" class="py-2 px-3 rounded-xl bg-zinc-800 text-zinc-300 font-bold text-xs active:scale-95 transition">Переказ</button>
            </div>

            <!-- Сума -->
            <div>
                <input type="number" id="tx-amount" step="0.01" placeholder="Сума, ₴" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl py-3 px-4 text-white text-lg font-bold focus:outline-none focus:border-emerald-500 transition">
            </div>

            <!-- Рахунок відправника (або єдиний рахунок) -->
            <div id="source-acc-block" class="grid grid-cols-2 gap-2">
                <button onclick="setSourceAcc('card')" id="btn-source-card" class="py-2.5 rounded-xl bg-zinc-800 border border-transparent text-xs font-semibold text-zinc-300 flex justify-center items-center"><i class="fa-solid fa-credit-card mr-1.5"></i> Картка</button>
                <button onclick="setSourceAcc('cash')" id="btn-source-cash" class="py-2.5 rounded-xl bg-zinc-800 border border-transparent text-xs font-semibold text-zinc-300 flex justify-center items-center"><i class="fa-solid fa-wallet mr-1.5"></i> Готівка</button>
            </div>

            <!-- Рахунок отримувача (Тільки для типу "Переказ") -->
            <div id="target-acc-block" class="hidden">
                <span class="text-xs text-zinc-500 block mb-1.5">Куди переказуємо:</span>
                <div class="grid grid-cols-3 gap-2">
                    <button onclick="setTargetAcc('card')" id="btn-target-card" class="py-2 rounded-xl bg-zinc-800 text-xs text-zinc-300">Картка</button>
                    <button onclick="setTargetAcc('cash')" id="btn-target-cash" class="py-2 rounded-xl bg-zinc-800 text-xs text-zinc-300">Готівка</button>
                    <button onclick="setTargetAcc('piggy')" id="btn-target-piggy" class="py-2 rounded-xl bg-zinc-800 text-xs text-zinc-300">Скарбничка</button>
                </div>
            </div>

            <!-- Коментар / Категорія -->
            <div>
                <input type="text" id="tx-comment" placeholder="Опис (напр., Кава, Аванс)" class="w-full bg-zinc-950 border border-zinc-800 rounded-xl py-2.5 px-4 text-zinc-300 text-sm focus:outline-none focus:border-emerald-500 transition">
            </div>

            <!-- Кнопка запису -->
            <button onclick="processTransaction()" class="w-full bg-emerald-600 hover:bg-emerald-500 active:scale-95 transition text-white font-bold py-3 rounded-xl text-sm shadow-lg shadow-emerald-900/20">
                Зафіксувати транзакцію
            </button>
        </div>
    </section>

    <!-- ОСТАННІ ТРАНЗАКЦІЇ -->
    <section class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800 mb-6">
        <h3 class="text-sm font-semibold text-zinc-400 mb-3"><i class="fa-solid fa-clock-rotate-left mr-1 text-blue-400"></i> Історія транзакцій</h3>
        <div id="tx-history" class="space-y-3 max-h-60 overflow-y-auto pr-1">
            <!-- Рядки історії -->
        </div>
    </section>

    <!-- ФІКСОВАНА КНОПКА ЗАКРИТТЯ ДНЯ -->
    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-zinc-950/80 backdrop-blur-md border-t border-zinc-900">
        <button onclick="closeFinancialDay()" class="w-full bg-zinc-900 hover:bg-zinc-800 border border-zinc-800 text-yellow-400 hover:text-yellow-300 active:scale-95 transition font-bold py-3 rounded-xl text-xs tracking-wider flex justify-center items-center">
            <i class="fa-solid fa-moon mr-2"></i> ЗАКРИТИ ФІНАНСОВИЙ ДЕНЬ
        </button>
    </div>

    <!-- ЛОГІКА ДОДАТКА -->
    <script>
        // База даних в LocalStorage
        let state = JSON.parse(localStorage.getItem('finlog_state')) || {
            balances: { card: 0, cash: 0, piggy: 0 },
            history: [],
            presets: [
                { id: 1, label: '☕ Кава', amount: 60 },
                { id: 2, label: '🍔 Обід', amount: 180 },
                { id: 3, label: '🚗 Паливо', amount: 500 },
                { id: 4, label: '🛒 Сільпо', amount: 300 }
            ]
        };

        let currentTx = {
            type: 'expense', // income, expense, transfer
            sourceAcc: 'card', // card, cash
            targetAcc: null // card, cash, piggy (hanya untuk transfer)
        };

        let presetEditMode = false;

        // Ініціалізація додатку
        window.onload = function() {
            updateUI();
            setTxType('expense');
            setSourceAcc('card');
        };

        function saveState() {
            localStorage.setItem('finlog_state', JSON.stringify(state));
            updateUI();
        }

        // Оновлення інтерфейсу
        function updateUI() {
            document.getElementById('bal-card').innerText = state.balances.card.toFixed(2);
            document.getElementById('bal-cash').innerText = state.balances.cash.toFixed(2);
            document.getElementById('bal-piggy').innerText = state.balances.piggy.toFixed(2);

            renderPresets();
            renderHistory();
        }

        // Рендер швидких пресетів
        function renderPresets() {
            const list = document.getElementById('presets-list');
            list.innerHTML = '';
            state.presets.forEach(p => {
                const btn = document.createElement('div');
                btn.className = "relative flex items-center";
                
                // Кнопка самого пресету
                const mainBtn = document.createElement('button');
                mainBtn.className = `py-2 px-3.5 rounded-xl bg-zinc-800 border border-zinc-700 text-xs text-white font-medium hover:bg-zinc-700 active:scale-95 transition ${presetEditMode ? 'opacity-50 pointer-events-none' : ''}`;
                mainBtn.innerHTML = `${p.label} <span class="text-zinc-400 ml-1">${p.amount}₴</span>`;
                mainBtn.onclick = () => applyPreset(p);

                // Червоний хрестик видалення в режимі редагування
                if (presetEditMode) {
                    const delBtn = document.createElement('button');
                    delBtn.className = "absolute -top-1.5 -right-1.5 bg-red-500 text-white rounded-full w-4 h-4 text-[9px] flex items-center justify-center border border-zinc-900";
                    delBtn.innerHTML = '<i class="fa-solid fa-xmark"></i>';
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        deletePreset(p.id);
                    };
                    btn.appendChild(delBtn);
                }

                btn.appendChild(mainBtn);
                list.appendChild(btn);
            });
        }

        // Рендер історії
        function renderHistory() {
            const container = document.getElementById('tx-history');
            container.innerHTML = '';

            if (state.history.length === 0) {
                container.innerHTML = '<div class="text-center text-xs text-zinc-600 py-4">Транзакцій поки немає</div>';
                return;
            }

            state.history.slice().reverse().forEach((tx, index) => {
                const realIndex = state.history.length - 1 - index;
                const row = document.createElement('div');
                row.className = "flex justify-between items-center p-2 rounded-xl bg-zinc-950/40 border border-zinc-800/50 text-xs";
                
                let icon = '';
                let colorClass = 'text-white';
                let amountText = `${tx.amount.toFixed(2)} ₴`;

                if (tx.type === 'income') {
                    icon = '<i class="fa-solid fa-arrow-down text-emerald-500 mr-2"></i>';
                    colorClass = 'text-emerald-400 font-bold';
                    amountText = `+${amountText}`;
                } else if (tx.type === 'expense') {
                    icon = '<i class="fa-solid fa-arrow-up text-red-400 mr-2"></i>';
                    colorClass = 'text-red-400';
                    amountText = `-${amountText}`;
                } else {
                    icon = '<i class="fa-solid fa-shuffle text-blue-400 mr-2"></i>';
                    colorClass = 'text-blue-400';
                }

                row.innerHTML = `
                    <div class="flex items-center">
                        ${icon}
                        <div>
                            <p class="font-semibold text-zinc-300">${tx.comment || 'Без опису'}</p>
                            <span class="text-[10px] text-zinc-500">${tx.date} • ${getAccountLabel(tx.account)}</span>
                        </div>
                    </div>
                    <div class="flex items-center space-x-2">
                        <span class="${colorClass}">${amountText}</span>
                        ${tx.type === 'expense' ? `<button onclick="createPresetFromTx(${realIndex})" class="text-zinc-600 hover:text-yellow-500 p-1" title="Створити пресет"><i class="fa-regular fa-star"></i></button>` : ''}
                    </div>
                `;
                container.appendChild(row);
            });
        }

        function getAccountLabel(acc) {
            if (acc === 'card') return '💳 Картка';
            if (acc === 'cash') return '💵 Готівка';
            return '🐷 Скарб';
        }

        // Перемикання типів транзакцій
        function setTxType(type) {
            currentTx.type = type;
            ['income', 'expense', 'transfer'].forEach(t => {
                const btn = document.getElementById(`btn-type-${t}`);
                if (t === type) {
                    btn.className = "py-2 px-3 rounded-xl text-xs font-bold transition bg-emerald-600 text-white";
                } else {
                    btn.className = "py-2 px-3 rounded-xl text-xs font-bold transition bg-zinc-800 text-zinc-400";
                }
            });

            const targetBlock = document.getElementById('target-acc-block');
            const sourceBlock = document.getElementById('source-acc-block');

            if (type === 'transfer') {
                targetBlock.classList.remove('hidden');
                setSourceAcc('card');
                setTargetAcc('cash');
            } else {
                targetBlock.classList.add('hidden');
            }
        }

        // Вибір рахунку відправника
        function setSourceAcc(acc) {
            currentTx.sourceAcc = acc;
            ['card', 'cash'].forEach(a => {
                const btn = document.getElementById(`btn-source-${a}`);
                if (a === acc) {
                    btn.classList.add('border-emerald-500', 'text-white', 'bg-zinc-800/80');
                } else {
                    btn.classList.remove('border-emerald-500', 'text-white', 'bg-zinc-800/80');
                }
            });
        }

        // Вибір рахунку отримувача (тільки для переказів)
        function setTargetAcc(acc) {
            currentTx.targetAcc = acc;
            ['card', 'cash', 'piggy'].forEach(a => {
                const btn = document.getElementById(`btn-target-${a}`);
                if (a === acc) {
                    btn.className = "py-2 rounded-xl text-xs text-white bg-emerald-600 font-bold";
                } else {
                    btn.className = "py-2 rounded-xl text-xs text-zinc-400 bg-zinc-800";
                }
            });
        }

        // Обробка транзакції
        function processTransaction() {
            const amountInput = document.getElementById('tx-amount');
            const commentInput = document.getElementById('tx-comment');
            const amount = parseFloat(amountInput.value);

            if (isNaN(amount) || amount <= 0) {
                alert('Введіть коректну суму!');
                return;
            }

            const comment = commentInput.value.trim();
            const dateStr = new Date().toLocaleDateString('uk-UA', { hour: '2-digit', minute: '2-digit' });

            if (currentTx.type === 'income') {
                // Прихід
                if (currentTx.sourceAcc === 'card') {
                    // Правило Привату: 10% в Скарбничку, 90% на Картку
                    const piggyShare = Number((amount * 0.10).toFixed(2));
                    const cardShare = Number((amount - piggyShare).toFixed(2));

                    state.balances.card += cardShare;
                    state.balances.piggy += piggyShare;

                    state.history.push({
                        type: 'income',
                        amount: amount,
                        account: 'card',
                        comment: comment || 'Зарахування на картку (10% в Скарб)',
                        date: dateStr
                    });
                } else {
                    // Готівка без автоматизації
                    state.balances.cash += amount;
                    state.history.push({
                        type: 'income',
                        amount: amount,
                        account: 'cash',
                        comment: comment || 'Надходження готівки',
                        date: dateStr
                    });
                }
            } else if (currentTx.type === 'expense') {
                // Витрата
                if (currentTx.sourceAcc === 'card') {
                    // Правило Привату: округлення до 10 грн в більшу сторону
                    const roundedSum = Math.ceil(amount / 10) * 10;
                    const change = Number((roundedSum - amount).toFixed(2));

                    if (state.balances.card < (amount + change)) {
                        alert('Недостатньо коштів на Картці (враховуючи округлення)!');
                        return;
                    }

                    state.balances.card -= (amount + change);
                    state.balances.piggy += change;

                    state.history.push({
                        type: 'expense',
                        amount: amount,
                        account: 'card',
                        comment: comment || 'Покупка з картки',
                        date: dateStr
                    });

                    if (change > 0) {
                        state.history.push({
                            type: 'transfer',
                            amount: change,
                            account: 'card',
                            comment: `🐷 Округлення транзакції до 10 грн`,
                            date: dateStr
                        });
                    }
                } else {
                    // Готівкова витрата без округлень
                    if (state.balances.cash < amount) {
                        alert('Недостатньо готівки!');
                        return;
                    }
                    state.balances.cash -= amount;
                    state.history.push({
                        type: 'expense',
                        amount: amount,
                        account: 'cash',
                        comment: comment || 'Витрата готівки',
                        date: dateStr
                    });
                }
            } else if (currentTx.type === 'transfer') {
                // Внутрішній переказ (без автоматизацій)
                const from = currentTx.sourceAcc;
                const to = currentTx.targetAcc;

                if (from === to) {
                    alert('Не можна переказати на той самий рахунок!');
                    return;
                }

                if (state.balances[from] < amount) {
                    alert('Недостатньо коштів для переказу!');
                    return;
                }

                state.balances[from] -= amount;
                state.balances[to] += amount;

                state.history.push({
                    type: 'transfer',
                    amount: amount,
                    account: from,
                    comment: `Переказ: ${getAccountLabel(from)} ➡️ ${getAccountLabel(to)} ${comment ? `(${comment})` : ''}`,
                    date: dateStr
                });
            }

            // Очищення полів
            amountInput.value = '';
            commentInput.value = '';
            saveState();
        }

        // Швидке застосування пресету
        function applyPreset(preset) {
            const dateStr = new Date().toLocaleDateString('uk-UA', { hour: '2-digit', minute: '2-digit' });
            const amount = preset.amount;

            // Звідки списувати: за замовчуванням з активного рахунку у формі
            const account = currentTx.sourceAcc;

            if (account === 'card') {
                const roundedSum = Math.ceil(amount / 10) * 10;
                const change = Number((roundedSum - amount).toFixed(2));

                if (state.balances.card < (amount + change)) {
                    alert('Недостатньо коштів на Картці!');
                    return;
                }

                state.balances.card -= (amount + change);
                state.balances.piggy += change;

                state.history.push({
                    type: 'expense',
                    amount: amount,
                    account: 'card',
                    comment: preset.label,
                    date: dateStr
                });

                if (change > 0) {
                    state.history.push({
                        type: 'transfer',
                        amount: change,
                        account: 'card',
                        comment: `🐷 Округлення транзакції до 10 грн`,
                        date: dateStr
                    });
                }
            } else {
                if (state.balances.cash < amount) {
                    alert('Недостатньо готівки!');
                    return;
                }
                state.balances.cash -= amount;
                state.history.push({
                    type: 'expense',
                    amount: amount,
                    account: 'cash',
                    comment: preset.label,
                    date: dateStr
                });
            }

            saveState();
        }

        // Перемикач режиму редагування пресетів
        function togglePresetEditMode() {
            presetEditMode = !presetEditMode;
            const btn = document.getElementById('btn-edit-presets');
            if (presetEditMode) {
                btn.className = "text-yellow-500 hover:text-yellow-400 transition scale-110";
            } else {
                btn.className = "text-zinc-500 hover:text-white transition";
            }
            renderPresets();
        }

        // Створення пресету на основі транзакції
        function createPresetFromTx(index) {
            const tx = state.history[index];
            const label = prompt('Введіть коротку назву пресету (наприклад, ☕ Кава):', tx.comment);
            if (!label) return;

            const newPreset = {
                id: Date.now(),
                label: label,
                amount: tx.amount
            };

            state.presets.push(newPreset);
            saveState();
        }

        // Видалення пресету
        function deletePreset(id) {
            state.presets = state.presets.filter(p => p.id !== id);
            saveState();
        }

        // ЗАКРИТТЯ ФІНАНСОВОГО ДНЯ (Округлення залишку картки в меншу сторону до 10 грн)
        function closeFinancialDay() {
            const balance = state.balances.card;
            if (balance <= 0) {
                alert('Баланс картки нульовий, округлювати нічого.');
                return;
            }

            const roundedBalance = Math.floor(balance / 10) * 10;
            const change = Number((balance - roundedBalance).toFixed(2));

            if (change <= 0) {
                alert('Баланс вже рівний та округлений до 10 грн.');
                return;
            }

            state.balances.card = roundedBalance;
            state.balances.piggy += change;

            const dateStr = new Date().toLocaleDateString('uk-UA', { hour: '2-digit', minute: '2-digit' });
            state.history.push({
                type: 'transfer',
                amount: change,
                account: 'card',
                comment: `🌙 Закриття дня: зрізання дріб'язку в Скарбничку`,
                date: dateStr
            });

            saveState();
            alert(`День успішно закрито!\nНа Скарбничку відправлено: ${change.toFixed(2)} ₴`);
        }

        // РЕЗЕРВНЕ КОПІЮВАННЯ ТА ВІДНОВЛЕННЯ
        function exportBackup() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", `finlog_backup_${new Date().toISOString().slice(0,10)}.json`);
            dlAnchorElem.click();
        }

        function importBackup() {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = e => {
                const file = e.target.files[0];
                const reader = new FileReader();
                reader.readAsText(file, 'UTF-8');
                reader.onload = readerEvent => {
                    try {
                        const parsed = JSON.parse(readerEvent.target.result);
                        if (parsed.balances && parsed.history) {
                            state = parsed;
                            saveState();
                            alert('Дані успішно імпортовано!');
                        } else {
                            alert('Некоректний файл резервної копії.');
                        }
                    } catch (err) {
                        alert('Помилка при зчитуванні файлу.');
                    }
                }
            }
            input.click();
        }

        function clearAllData() {
            if (confirm('Ви впевнені, що хочете ОЧИСТИТИ ВСІ дані? Цю дію неможливо скасувати!')) {
                localStorage.removeItem('finlog_state');
                location.reload();
            }
        }
    </script>
</body>
</html>
